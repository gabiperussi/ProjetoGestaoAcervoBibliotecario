<!DOCTYPE html>
<html lang="pt-BR"> <head>
    <meta charset="UTF-8">
    <title>Sistema de Gestão de Biblioteca</title>
</head>
<body>
    <h1>Faça o login</h1>
    <form id="FormLogin"> 
        <div class="formContainer">
            <input type="email" placeholder="E-mail" id="email" required>
            <br> <br>
            <input type="password" placeholder="Senha" id="senha" required>
            <br> <br>
            <button type="submit">Entrar</button>
        </div>
    </form>
    <div id="mensagem"></div> 

    <script>
        // Ajuste a URL se necessário para o caminho real da sua API
        const API_BASE = "http://localhost/ProjetoGestaoAcervoBibliotecario/api_livros";

        function getFormData() {
            return { 
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value 
            }; 
        } 
        
        // Função com 'U' maiúsculo conforme seu padrão
        async function Login(User) {
            try {
                const resposta = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        "Content-Type": 'application/json'
                    },
                    body: JSON.stringify(User) // Corrigido: Usando o parâmetro 'User'
                });

                // .json() extrai o corpo da resposta enviada pela View do PHP
                const dados = await resposta.json(); 

                if (!resposta.ok) {
                    console.log("Erro na requisição:", resposta);
                    // Lança um erro com a mensagem vinda do PHP se houver
                    throw new Error(dados.message || `Erro HTTP: ${resposta.status}`);
                }

                return dados; // Retorna o array do usuário vindo do PHP
            } catch (error) {
                console.error("Falha no processo de login:", error);
                throw error; 
            }
        }

        async function handleFormSubmit(event) {
            event.preventDefault(); // Corrigido: preventDefault
            
            const msg = document.getElementById('mensagem');
            const user = getFormData();

            console.log("Tentando login com:", user);

            try {
                // Chamando a função Login (com L maiúsculo)
                const resultado = await Login(user);
                
                console.log("Resultado da API:", resultado);

                if (resultado) {
                    // Guarda os dados na sessão do navegador
                    sessionStorage.setItem('usuario', JSON.stringify(resultado));
                    // Redireciona
                    window.location.href = "principal.html"; // Corrigido: window (singular)
                }
            } catch (error) {
                msg.textContent = `Erro: ${error.message}`;
                msg.style.color = "red";
            }
        }

        // Garante que o código rode apenas após o HTML carregar
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('FormLogin').addEventListener('submit', handleFormSubmit);
        });
    </script>
</body>
</html>
